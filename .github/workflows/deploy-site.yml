name: Deploy Site

# Builds the showcase / docs site (site/) into a Docker image, pushes it to GHCR,
# then notifies Dokploy to redeploy. Modeled on the Yunxin frontend pipeline but
# single-image: the site is a static-ish Next standalone app with no backend/DB.
#
# The library build (typecheck/test/tsup) is covered by ci.yml; the Docker build
# here re-runs `pnpm build` + the site build inside the image, so a broken build
# fails the workflow before anything is pushed or deployed.

on:
  push:
    branches: [main]
    paths:
      # The site embeds the built library, so library source changes ship too.
      - "site/**"
      - "src/**"
      - "styles/**"
      - "icons/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SITE_IMAGE: ghcr.io/${{ github.repository }}-site

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Build & Push (Docker → GHCR)
  # ============================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SITE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate content hash for cache busting
        id: content-hash
        run: |
          CONTENT_HASH=$(find ./site/content -type f -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)
          echo "hash=${CONTENT_HASH:0:16}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # Context is the repo root: the site imports the parent library.
          context: .
          file: ./site/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CONTENT_HASH=${{ steps.content-hash.outputs.hash }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.SITE_IMAGE }}:latest
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

  # ============================================
  # Notify Dokploy (redeploy the new image)
  # ============================================
  notify:
    name: Notify Dokploy
    needs: [build]
    if: always() && !cancelled() && needs.build.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read

    steps:
      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: "${{ github.token }}"
          environment: "${{ github.ref_name }}"
          initial-status: "in_progress"
          auto-inactive: false

      - name: Send deployment webhook
        # No-op until DOKPLOY_WEBHOOK_URL_SITE is configured in repo secrets.
        if: ${{ secrets.DOKPLOY_WEBHOOK_URL_SITE != '' }}
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.DOKPLOY_WEBHOOK_URL_SITE }}" \
            -d '{
              "event": "deploy",
              "service": "site",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "image": "${{ env.SITE_IMAGE }}:${{ github.ref_name }}"
            }'

      - name: Update GitHub Deployment (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: "${{ github.token }}"
          environment-url: ${{ secrets.SITE_DOMAIN != '' && format('https://{0}', secrets.SITE_DOMAIN) || '' }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: "success"

      - name: Update GitHub Deployment (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: "${{ github.token }}"
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: "failure"
