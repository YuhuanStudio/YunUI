name: Release

# Push a version tag (e.g. v0.1.6) → GitHub Actions builds + publishes to npm.
# Auth is tokenless via npm OIDC "Trusted Publishing": configure the package
# on npmjs.com (Settings → Trusted Publisher → GitHub Actions, repo
# YuhuanStudio/YunUI, workflow release.yml). No NPM_TOKEN secret needed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"; exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; node 22 ships an older npm.
      - name: Update npm (for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Publish to npm (tokenless OIDC + provenance)
        run: npm publish --provenance --access public
